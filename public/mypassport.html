<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport"/>
    
    <!-- Tailwind CSS loaded synchronously to ensure 100% style fidelity -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- TensorFlow scripts deferred to eliminate initial screen freeze -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd" defer></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#d95191",
                        "primary-container": "#fcebf3",
                        "on-surface": "#412b36",
                        "on-surface-variant": "#7c6872",
                        "surface": "#fffbfe",
                        "surface-container-low": "#fdf4f8",
                        "surface-container-high": "#fbe7f0",
                        "surface-container-highest": "#f7d3e3",
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .step-container { display: none; }
        .step-container.active { 
            display: block; 
            animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Dashboard Scrollbar Hide */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* NEW: Smooth Transitions for Bottom Sheet & Modal */
        .bottom-sheet {
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .bottom-sheet.open {
            transform: translateY(0);
        }
        .modal-scale {
            transform: scale(0.95);
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
        }
        .modal-scale.open {
            transform: scale(1);
            opacity: 1;
        }
    </style>
</head>

<body class="bg-surface text-on-surface antialiased">

    <!-- Navbar: Exact layout from peto.html with active back button -->
    <nav class="flex items-center justify-between px-6 pt-5 pb-2 max-w-md mx-auto">
        <button type="button" id="backBtn" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-low border border-surface-container-high hover:bg-primary-container/40 transition-all active:scale-95">
            <span class="material-symbols-outlined text-on-surface text-xl">arrow_back_ios_new</span>
        </button>
        <div class="flex flex-col items-center">
            <h2 class="font-bold text-lg text-on-surface" id="headerTitle">My Passports</h2>
        </div>
        <div class="w-10"></div>
    </nav>

    <!-- Main Container: 100% matched padding with peto.html -->
    <main class="px-6 py-2 max-w-md mx-auto">
        
        <div id="step0" class="step-container active space-y-6">
            <div class="space-y-1">
                <h1 class="text-2xl font-extrabold tracking-tight">Digital Identities</h1>
                <p class="text-on-surface-variant text-sm">Manage your pet passports or create a new one.</p>
            </div>

            <div class="w-full relative mt-4">
                <div class="flex items-center justify-end gap-1 mb-2 text-primary/70 pr-2 animate-pulse">
                    <span class="text-[10px] font-bold uppercase tracking-wider">Swipe Right</span>
                    <span class="material-symbols-outlined text-sm">arrow_forward</span>
                </div>

                <!-- Padding and negative margin fine-tuned to guarantee a flawless 7-8% card peeking preview -->
                <div id="passportCardsContainer" class="flex overflow-x-auto no-scrollbar snap-x snap-mandatory gap-4 pb-6 pt-1 px-6 -mx-6" style="scroll-padding-left: 1.5rem;">
                    
                    <!-- Dynamic Passport Cards will be loaded here -->
                    
                    <!-- Loading Shimmer Placeholder -->
                    <div id="loadingPlaceholder" class="snap-start shrink-0 w-[85vw] max-w-[320px] flex flex-col justify-stretch">
                        <div class="bg-surface rounded-[28px] border border-surface-container-highest p-6 min-h-[380px] flex flex-col items-center justify-center space-y-3">
                            <div class="w-10 h-10 rounded-full border-4 border-primary/20 border-t-primary animate-spin"></div>
                            <p class="text-xs font-bold text-on-surface-variant uppercase tracking-wider animate-pulse">Syncing Sruvo Ledger...</p>
                        </div>
                    </div>

                    <!-- Add Card: Exactly identical design with absolute zero modifications -->
                    <div id="addCardContainer" class="hidden snap-start shrink-0 w-[85vw] max-w-[320px] flex flex-col justify-stretch">
                        <div onclick="triggerCreateNew()" class="w-full h-full min-h-[380px] border-[3px] border-dashed border-primary/30 rounded-[28px] bg-primary/5 flex flex-col items-center justify-center cursor-pointer hover:bg-primary/10 hover:border-primary/50 active:scale-[0.98] transition-all group shadow-sm">
                            <div class="w-20 h-20 bg-white rounded-full shadow-md border border-primary/10 flex items-center justify-center mb-4 group-hover:scale-110 group-hover:rotate-90 transition-transform duration-300">
                                <span class="material-symbols-outlined text-primary text-4xl">add</span>
                            </div>
                            <h3 class="text-xl font-black text-primary tracking-tight">Create New</h3>
                            <p class="text-xs font-semibold text-on-surface-variant mt-1 uppercase tracking-widest">Pet Passport</p>
                        </div>
                    </div>
                    
                </div>
            </div>
        </div>

    </main>

    <!-- Fullscreen QR Close-View Modal with Custom Anim & Close View Actions -->
    <div id="qrModal" class="fixed inset-0 z-[100] hidden opacity-0 bg-on-surface/40 backdrop-blur-md flex items-center justify-center p-6 transition-opacity duration-300" onclick="closeQRModal()">
        <div id="qrModalContent" class="bg-white rounded-[32px] p-6 w-full max-w-xs shadow-2xl border border-surface-container-highest text-center modal-scale" onclick="event.stopPropagation()">
            <div class="w-12 h-1 bg-surface-container-highest rounded-full mx-auto mb-5"></div>
            <h3 class="text-lg font-black tracking-tight text-on-surface">Scan Passport QR</h3>
            <p id="modalPassportId" class="text-xs font-bold font-mono text-primary bg-primary-container/50 px-2 py-0.5 rounded-md w-fit mx-auto mt-1"></p>
            
            <div class="my-6 p-4 bg-surface-container-low border-2 border-dashed border-primary/20 rounded-[24px] flex items-center justify-center aspect-square max-w-[220px] mx-auto shadow-inner">
                <img id="modalQRCodeImg" src="" alt="Expanded QR Code" class="w-full h-full object-contain rounded-lg">
            </div>
            
            <button onclick="closeQRModal()" class="w-full bg-surface-container-high hover:bg-surface-container-highest text-on-surface font-bold py-3.5 rounded-2xl text-xs tracking-wider uppercase transition-colors active:scale-98">
                Close View
            </button>
        </div>
    </div>

    <!-- Quick Actions Bottom Sheet with Custom Slide Transition & Handlers -->
    <div id="actionSheet" class="fixed inset-0 z-[90] hidden opacity-0 bg-on-surface/30 backdrop-blur-sm transition-opacity duration-300" onclick="closeQuickActions()">
        <div id="actionSheetContent" class="fixed bottom-0 left-0 w-full bg-surface border-t border-surface-container-highest rounded-t-[32px] p-6 pb-8 bottom-sheet shadow-[0_-10px_30px_rgba(0,0,0,0.05)]" onclick="event.stopPropagation()">
            <div class="w-12 h-1 bg-surface-container-highest rounded-full mx-auto mb-5"></div>
            
            <div class="mb-4">
                <h4 id="sheetPetName" class="text-base font-black text-on-surface">Pet's Passport</h4>
                <p class="text-xs text-on-surface-variant font-medium">Choose a quick action for this digital record.</p>
            </div>

            <div class="space-y-2">
                <button onclick="handleEditPassportDetails()" class="w-full flex items-center gap-3 p-4 rounded-2xl bg-surface-container-low border border-surface-container-high text-on-surface hover:bg-primary-container/20 transition-all active:scale-[0.99]">
                    <span class="material-symbols-outlined text-primary">edit</span>
                    <span class="text-sm font-bold tracking-tight">Edit Passport Details</span>
                </button>
                
                <button onclick="handleDownloadPDF()" class="w-full flex items-center gap-3 p-4 rounded-2xl bg-surface-container-low border border-surface-container-high text-on-surface hover:bg-primary-container/20 transition-all active:scale-[0.99]">
                    <span class="material-symbols-outlined text-primary">download</span>
                    <span class="text-sm font-bold tracking-tight">Download Passport PDF</span>
                </button>
                
                <button onclick="handleShareLink()" class="w-full flex items-center gap-3 p-4 rounded-2xl bg-surface-container-low border border-surface-container-high text-on-surface hover:bg-primary-container/20 transition-all active:scale-[0.99]">
                    <span class="material-symbols-outlined text-primary">share</span>
                    <span class="text-sm font-bold tracking-tight">Share Verified Passport Link</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Glowing Background Overlay: Exact markup from peto.html -->
    <div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none opacity-40">
        <div class="absolute top-0 right-0 w-64 h-64 bg-primary/5 rounded-full blur-[80px]"></div>
    </div>

    <script>
        let currentStep = 0;

        // NEW: Fullscreen QR Modal Logic
        function openQRModal(url, passportId) {
            const modal = document.getElementById('qrModal');
            const modalContent = document.getElementById('qrModalContent');
            if (document.getElementById('modalPassportId')) {
                document.getElementById('modalPassportId').innerText = passportId;
            }
            if (document.getElementById('modalQRCodeImg')) {
                document.getElementById('modalQRCodeImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(url)}&color=d95191`;
            }
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                if (modalContent) modalContent.classList.add('open');
            }, 10);
        }

        function closeQRModal() {
            const modal = document.getElementById('qrModal');
            const modalContent = document.getElementById('qrModalContent');
            if (modalContent) modalContent.classList.remove('open');
            modal.classList.add('opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // NEW: Quick Actions Bottom Sheet Logic
        function openQuickActions(passportId, petName) {
            const sheet = document.getElementById('actionSheet');
            const sheetContent = document.getElementById('actionSheetContent');
            if (document.getElementById('sheetPetName')) {
                document.getElementById('sheetPetName').innerText = `${petName}'s Passport`;
            }
            
            sheet.dataset.selectedPassportId = passportId;
            sheet.dataset.selectedPetName = petName;

            sheet.classList.remove('hidden');
            setTimeout(() => {
                sheet.classList.remove('opacity-0');
                if (sheetContent) sheetContent.classList.add('open');
            }, 10);
        }

        function closeQuickActions() {
            const sheet = document.getElementById('actionSheet');
            const sheetContent = document.getElementById('actionSheetContent');
            if (sheetContent) sheetContent.classList.remove('open');
            sheet.classList.add('opacity-0');
            setTimeout(() => {
                sheet.classList.add('hidden');
            }, 400);
        }

        function handleEditPassportDetails() {
            const sheet = document.getElementById('actionSheet');
            const passportId = sheet.dataset.selectedPassportId;
            closeQuickActions();
            if (passportId) {
                openPassportDetails(passportId);
            }
        }

        function handleDownloadPDF() {
            const sheet = document.getElementById('actionSheet');
            const passportId = sheet.dataset.selectedPassportId;
            closeQuickActions();
            if (passportId) {
                const printUrl = `/userQR.html?id=${encodeURIComponent(passportId)}&print=true`;
                window.open(printUrl, '_blank');
            }
        }

        function handleShareLink() {
            const sheet = document.getElementById('actionSheet');
            const passportId = sheet.dataset.selectedPassportId;
            closeQuickActions();
            if (passportId) {
                const shareUrl = `https://sruvoindia.vercel.app/passport/${passportId}`;
                
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(shareUrl)
                        .then(() => {
                            showToast("Passport link copied!");
                        })
                        .catch(err => {
                            console.error("Clipboard copy failed:", err);
                            showToast("Copied Sruvo passport link!");
                        });
                } else {
                    const el = document.createElement('textarea');
                    el.value = shareUrl;
                    document.body.appendChild(el);
                    el.select();
                    document.execCommand('copy');
                    document.body.removeChild(el);
                    showToast("Passport link copied!");
                }
            }
        }

        function showToast(message) {
            const existing = document.getElementById('custom-toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.id = 'custom-toast';
            toast.className = 'fixed bottom-24 left-1/2 -translate-x-1/2 z-[110] bg-[#412b36] text-[#fffbfe] text-xs font-bold px-4 py-3 rounded-full shadow-lg border border-primary/20 transition-all duration-300 transform translate-y-4 opacity-0 flex items-center gap-2';
            toast.innerHTML = `
                <span class="material-symbols-outlined text-primary text-sm">verified</span>
                <span>${message}</span>
            `;
            document.body.appendChild(toast);

            toast.offsetHeight; // Reflow
            toast.classList.remove('opacity-0', 'translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');

            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-4');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 2500);
        }
        
        function triggerCreateNew() {
            window.parent.postMessage('create_new_passport', '*');
        }

        function openPassportDetails(passportId) {
            window.parent.postMessage({ type: 'open_passport', passportId }, '*');
        }

        function formatDateString(dateStr, ageType = 'exact') {
            if (!dateStr) return 'N/A';
            try {
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return dateStr;
                const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
                if (ageType === 'approx' || ageType === 'approximate') {
                    return `~ ${months[d.getMonth()]} ${d.getFullYear()}`;
                }
                return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
            } catch(e) {
                return dateStr;
            }
        }

        document.getElementById('backBtn').addEventListener('click', () => {
            window.parent.postMessage('close_pet_passport_flow', '*');
        });

        // Fetch and load real passports
        async function loadPassports() {
            const container = document.getElementById('passportCardsContainer');
            const loadingPlaceholder = document.getElementById('loadingPlaceholder');
            const addCard = document.getElementById('addCardContainer');

            try {
                const urlParams = new URLSearchParams(window.location.search);
                const passedUserId = urlParams.get('userId');
                const res = await fetch(`/api/pet-passport${passedUserId ? '?userId=' + passedUserId : ''}`);
                let passports = [];
                if (res.ok) {
                    passports = await res.json();
                }

                // Remove loading spinner
                if (loadingPlaceholder) {
                    loadingPlaceholder.remove();
                }

                // Render dynamic cards
                passports.forEach(p => {
                    const passportId = p.passport_id || p.passportId || 'SRV-102-445';
                    const petName = p.pet_name || p.petName || 'Buddy';
                    const breed = p.breed || p.species || 'Golden Retriever';
                    const gender = p.gender || 'Male';
                    const weight = p.weight ? (p.weight.toString().includes('kg') ? p.weight : `${p.weight} kg`) : 'N/A';
                    const dob = formatDateString(p.dob, p.age_type || p.ageType);
                    const ownerName = p.owner_name || p.ownerName || 'Rijas Pabla';
                    const photoUrl = p.photo_url || p.photoUrl || "https://images.unsplash.com/photo-1583511655857-d19b40a7a54e?ixlib=rb-4.0.3&auto=format&fit=crop&w=200&q=80";
                    const appearance = p.appearance || 'Golden coat with white chest patch';

                    const cardHtml = `
                        <div onclick="openPassportDetails('${passportId}')" class="snap-start shrink-0 w-[85vw] max-w-[320px] flex flex-col justify-stretch cursor-pointer select-none">
                            <div class="bg-gradient-to-br from-[#1a1a24] to-[#3a2a32] p-1 rounded-[28px] shadow-2xl relative overflow-hidden group h-full min-h-[380px] flex flex-col">
                                <div class="absolute inset-0 bg-gradient-to-tr from-primary/0 via-white/20 to-primary/0 opacity-0 group-hover:opacity-100 transition-opacity duration-1000 rotate-45 transform -translate-x-full group-hover:translate-x-full ease-out"></div>
                                
                                <div class="bg-surface rounded-[24px] overflow-hidden flex flex-col relative z-10 h-full border border-surface-container-highest">
                                    <div class="bg-gradient-to-r from-primary to-[#e56ba4] px-5 py-4 flex justify-between items-center relative overflow-hidden">
                                        <div class="absolute -right-4 -top-4 w-24 h-24 bg-white/10 rounded-full blur-xl"></div>
                                        <div class="relative z-10 text-white flex flex-col justify-center">
                                            <div class="flex items-center gap-1.5 mb-2 border-b border-white/20 pb-1.5 w-fit">
                                                <img src="/sruvologo.png" alt="Sruvo Logo" class="w-12 h-12 object-contain drop-shadow-sm" />
                                                <span class="text-base font-black tracking-[0.2em] uppercase mt-1 flex items-center">Sruvo</span>
                                            </div>
                                            <p class="text-[8px] uppercase tracking-[0.2em] font-extrabold opacity-90">Republic of Sruvo</p>
                                            <p class="text-[19px] font-black tracking-wide leading-tight mt-0.5 shadow-sm">PET PASSPORT</p>
                                        </div>
                                        <div class="relative z-10 bg-white/20 p-2.5 rounded-2xl backdrop-blur-sm border border-white/20 shadow-inner flex items-center justify-center">
                                            <span class="material-symbols-outlined text-white text-[28px]">verified_user</span>
                                        </div>
                                    </div>
                                    
                                    <div class="p-6 bg-white space-y-5 relative flex-1 animate-fadeInUp">
                                        <span class="material-symbols-outlined absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-[120px] text-surface-container-highest opacity-30 pointer-events-none">shield_with_heart</span>

                                        <div class="flex justify-between items-start relative z-10">
                                            <div class="flex gap-4 items-center">
                                                <div class="w-20 h-20 rounded-[18px] bg-surface-container-high border-2 border-primary/20 shadow-md flex items-center justify-center overflow-hidden shrink-0">
                                                    <img src="${photoUrl}" alt="${petName}" class="w-full h-full object-cover">
                                                </div>
                                                <div class="space-y-1">
                                                    <h2 class="text-2xl font-black text-on-surface leading-none tracking-tight">${petName}</h2>
                                                    <p class="text-[11px] font-bold text-primary uppercase tracking-wider">${breed}</p>
                                                    <p class="text-[11px] font-semibold text-on-surface-variant flex items-center gap-1.5 mt-1 bg-surface-container-low w-fit px-2 py-0.5 rounded-md border border-surface-container-highest">
                                                        <span class="material-symbols-outlined text-[14px] text-primary">${gender.toLowerCase() === 'female' ? 'female' : 'male'}</span> ${gender} • ${weight}
                                                    </p>
                                                </div>
                                            </div>
                                            
                                            <button onclick="event.stopPropagation(); openQuickActions('${passportId}', '${petName}')" class="w-8 h-8 rounded-full bg-surface-container-low border border-surface-container-highest flex items-center justify-center text-on-surface-variant hover:bg-primary-container/40 active:scale-90 transition-all cursor-pointer">
                                                <span class="material-symbols-outlined text-lg">more_horiz</span>
                                            </button>
                                        </div>

                                        <div class="border-t border-dashed border-surface-container-highest"></div>

                                        <div class="space-y-3.5 relative z-10">
                                            <div class="grid grid-cols-2 gap-y-3 gap-x-3">
                                                <div class="space-y-0.5">
                                                    <p class="text-[9px] text-on-surface-variant font-black uppercase tracking-widest">Passport ID</p>
                                                    <p class="text-sm font-black text-on-surface font-mono bg-surface-container-low px-2 py-1 rounded-md border border-surface-container-highest w-fit">${passportId}</p>
                                                </div>
                                                <div class="space-y-0.5">
                                                    <p class="text-[9px] text-on-surface-variant font-black uppercase tracking-widest">Date of Birth</p>
                                                    <p class="text-sm font-bold text-on-surface px-1">${dob}</p>
                                                </div>
                                                <div class="space-y-0.5">
                                                    <p class="text-[9px] text-on-surface-variant font-black uppercase tracking-widest">Owner</p>
                                                    <p class="text-sm font-bold text-on-surface px-1 truncate max-w-[120px] font-medium">${ownerName}</p>
                                                </div>
                                                <div class="space-y-0.5">
                                                    <p class="text-[9px] text-on-surface-variant font-black uppercase tracking-widest">Valid Till</p>
                                                    <p class="text-sm font-bold text-primary flex items-center gap-1 px-1">
                                                        <span class="material-symbols-outlined text-[14px]">all_inclusive</span> Lifetime
                                                    </p>
                                                </div>
                                            </div>
                                            <div class="space-y-0.5 border-t border-dashed border-surface-container-highest pt-2.5">
                                                <p class="text-[9px] text-on-surface-variant font-black uppercase tracking-widest">Appearance</p>
                                                <p class="text-[11px] font-semibold text-on-surface px-1 italic">${appearance}</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="bg-surface-container-low px-5 py-4 flex justify-between items-center border-t border-surface-container-highest relative z-10">
                                        <div class="space-y-1">
                                            <p class="text-[9px] text-on-surface-variant font-black uppercase tracking-widest">Registry Status</p>
                                            <div class="flex items-center gap-1.5 bg-green-100 px-2 py-1 rounded-md border border-green-200 w-fit">
                                                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                                                <p class="text-[11px] font-extrabold text-green-700 tracking-wide uppercase">Active & Verified</p>
                                            </div>
                                        </div>
                                        <div onclick="event.stopPropagation(); openQRModal('https://sruvoindia.vercel.app/passport/${passportId}', '${passportId}')" class="w-14 h-14 bg-white rounded-xl border-2 border-surface-container-highest p-1 flex items-center justify-center shadow-sm relative group cursor-pointer hover:border-primary/50 transition-colors" title="Tap to expand">
                                            <div class="absolute inset-0 bg-primary/5 rounded-xl opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                                                <span class="material-symbols-outlined text-primary text-xs font-bold">fullscreen</span>
                                            </div>
                                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://sruvoindia.vercel.app/passport/${passportId}&color=d95191" alt="QR Code" class="w-full h-full object-contain rounded-md" referrerPolicy="no-referrer">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    container.insertBefore(createElementFromHTML(cardHtml), addCard);
                });

                // Always reveal the add card at the end of the swipe list
                if (addCard) {
                    addCard.classList.remove('hidden');
                }

            } catch (err) {
                console.error("Error building dashboard passports list:", err);
                if (loadingPlaceholder) {
                    loadingPlaceholder.remove();
                }
                if (addCard) {
                    addCard.classList.remove('hidden');
                }
            }
        }

        function createElementFromHTML(htmlString) {
            const div = document.createElement('div');
            div.innerHTML = htmlString.trim();
            return div.firstChild;
        }

        window.addEventListener('load', loadPassports);
    </script>
