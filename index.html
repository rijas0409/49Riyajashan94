<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root">
      <div id="boot-status" style="position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #ffffff; color: #1e293b; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
        <div class="logo-pulse" style="width: 80px; height: 80px; background: linear-gradient(135deg, #B784E6 0%, #9061CB 100%); border-radius: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px -5px rgba(183, 132, 230, 0.4); margin-bottom: 24px; position: relative; overflow: hidden;">
          <span style="color: white; font-size: 40px; font-weight: bold; position: relative; z-index: 2;">S</span>
          <div style="position: absolute; inset: 0; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.2), transparent); animation: shimmer 2s infinite;"></div>
        </div>
        <div style="font-size: 18px; font-weight: 600; letter-spacing: -0.01em; color: #151B32;">Sruvo</div>
        <div style="margin-top: 12px; display: flex; gap: 4px;">
          <div class="dot" style="width: 6px; height: 6px; border-radius: 50%; background: #e2e8f0; animation: bounce 1s infinite 0s;"></div>
          <div class="dot" style="width: 6px; height: 6px; border-radius: 50%; background: #e2e8f0; animation: bounce 1s infinite 0.2s;"></div>
          <div class="dot" style="width: 6px; height: 6px; border-radius: 50%; background: #e2e8f0; animation: bounce 1s infinite 0.4s;"></div>
        </div>
        <style>
          @keyframes glow { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.95; } }
          @keyframes bounce { 0%, 100% { transform: translateY(0); background: #f1f5f9; } 50% { transform: translateY(-4px); background: #B784E6; } }
          @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
          .logo-pulse { animation: glow 2s ease-in-out infinite; }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
