<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root">
      <div id="boot-status" style="position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #ffffff; color: #1e293b; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
        <div class="logo-pulse" style="width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; margin-bottom: 24px;">
          <img src="/sruvo-logo.png" alt="Sruvo" style="width: 100%; height: 100%; object-fit: contain;" />
        </div>
        <div style="font-size: 24px; font-weight: 700; letter-spacing: -0.02em; color: #151B32; margin-bottom: 8px;">Sruvo</div>
        <div style="margin-top: 8px; display: flex; gap: 6px;">
          <div class="dot" style="width: 8px; height: 8px; border-radius: 50%; background: rgba(183, 132, 230, 0.2); animation: bounce 1s infinite 0s;"></div>
          <div class="dot" style="width: 8px; height: 8px; border-radius: 50%; background: rgba(183, 132, 230, 0.2); animation: bounce 1s infinite 0.2s;"></div>
          <div class="dot" style="width: 8px; height: 8px; border-radius: 50%; background: rgba(183, 132, 230, 0.2); animation: bounce 1s infinite 0.4s;"></div>
        </div>
        <style>
          @keyframes glow { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.08); opacity: 0.9; } }
          @keyframes bounce { 0%, 100% { transform: translateY(0); background: rgba(183, 132, 230, 0.2); } 50% { transform: translateY(-6px); background: #B784E6; } }
          .logo-pulse { animation: glow 2.5s ease-in-out infinite; }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
